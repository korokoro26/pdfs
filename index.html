<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>PDF共有サイト</title>
  <!-- 正しい Supabase CDN URL -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    #status { padding: 10px; background: #f0f0f0; margin-bottom: 10px; border-radius: 4px; }
    .error { color: red; font-weight: bold; }
    .success { color: green; font-weight: bold; }
  </style>
</head>
<body>
  <h1>PDF共有ポータル</h1>

  <!-- 状態表示エリア -->
  <div id="status">システム準備中...</div>

  <section>
    <h2>PDFをアップロード</h2>
    <input type="file" id="pdfFile" accept="application/pdf">
    <button id="uploadBtn">送信する</button>
  </section>

  <hr>

  <section>
    <h2>共有されたPDF一覧</h2>
    <ul id="pdfList"></ul>
  </section>

  <script>
    // ① ご自身の Supabase 情報に書き換えてください
    const SUPABASE_URL = 'https://wgjhqhcrepyhqcxrxujg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable__5xWbo2yzkPwOyecIN_gOQ_6VE83HNT';

    const statusEl = document.getElementById('status');
    let supabaseClient;

    try {
      // CDN (supabase-js) から Client を作成
      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      statusEl.innerHTML = 'Supabase接続完了。一覧を取得中...';
    } catch (e) {
      statusEl.innerHTML = `<span class="error">初期化エラー: ${e.message}</span>`;
    }

    // 一覧取得機能
    async function loadPdfs() {
      if (!supabaseClient) return;
      const listElement = document.getElementById('pdfList');
      
      const { data, error } = await supabaseClient.from('pdf_list').select('*').order('created_at', { ascending: false });

      if (error) {
        statusEl.innerHTML = `<span class="error">一覧取得失敗: ${error.message}</span>`;
        return;
      }

      statusEl.innerHTML = '<span class="success">正常に通信できています</span>';
      listElement.innerHTML = '';
      
      if (!data || data.length === 0) {
        listElement.innerHTML = '<li>まだPDFはありません</li>';
        return;
      }

      data.forEach(item => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="${item.file_url}" target="_blank">${item.file_name}</a> (${new Date(item.created_at).toLocaleString()})`;
        listElement.appendChild(li);
      });
    }

    // アップロード機能
    document.getElementById('uploadBtn').addEventListener('click', async () => {
      if (!supabaseClient) {
        alert('ライブラリが読み込まれていないため送信できません');
        return;
      }

      const fileInput = document.getElementById('pdfFile');
      const file = fileInput.files[0];

      if (!file) {
        alert('PDFファイルを選択してください');
        return;
      }

      statusEl.innerHTML = 'アップロード中...';

      const fileName = `${Date.now()}_${file.name}`;

      // A. Storageにアップロード
      const { data: storageData, error: storageError } = await supabaseClient.storage
        .from('pdfs')
        .upload(fileName, file);

      if (storageError) {
        statusEl.innerHTML = `<span class="error">Storage保存エラー: ${storageError.message}</span>`;
        return;
      }

      // 公開URLの取得
      const { data: urlData } = supabaseClient.storage.from('pdfs').getPublicUrl(fileName);
      const publicUrl = urlData.publicUrl;

      // B. データベースに保存
      const { error: dbError } = await supabaseClient.from('pdf_list').insert([
        { file_name: file.name, file_url: publicUrl }
      ]);

      if (dbError) {
        statusEl.innerHTML = `<span class="error">DB保存エラー: ${dbError.message}</span>`;
        return;
      }

      statusEl.innerHTML = '<span class="success">アップロード成功！</span>';
      fileInput.value = '';
      loadPdfs();
    });

    // 初期実行
    if (supabaseClient) loadPdfs();
  </script>
</body>
</html>
