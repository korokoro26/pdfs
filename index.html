<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF共有ポータル</title>
  
  <!-- 1. Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            apple: {
              bg: '#F5F5F7',
              card: '#FFFFFF',
              primary: '#0071E3',
              primaryHover: '#0077ED',
              danger: '#FF3B30',
              dangerHover: '#D73A31',
              text: '#1D1D1F',
              secondaryText: '#86868B',
              border: '#E5E5EA',
            }
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', '"SF Pro Text"', '"Helvetica Neue"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- 2. Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- 3. Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- 4. PDF.js (サムネイル生成用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>

  <style>
    .backdrop-blur-md {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: rgba(0,0,0,0.15);
      border-radius: 3px;
    }
  </style>
</head>
<body class="bg-apple-bg text-apple-text font-sans antialiased min-h-screen flex flex-col justify-between selection:bg-apple-primary selection:text-white">

  <!-- ヘッダーエリア -->
  <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-apple-border/60">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="p-2 bg-apple-primary/10 text-apple-primary rounded-xl">
          <i data-lucide="file-text" class="w-6 h-6"></i>
        </div>
        <h1 class="text-xl font-semibold tracking-tight text-apple-text">PDF共有ポータル</h1>
      </div>
      <!-- ステータスバッジ -->
      <div id="statusBadge" class="flex items-center space-x-2 px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 text-apple-secondaryText transition-all duration-300">
        <span class="w-2 h-2 rounded-full bg-gray-400 animate-pulse" id="statusDot"></span>
        <span id="statusText">システム初期化中...</span>
      </div>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="max-w-6xl mx-auto px-6 py-8 w-full flex-grow space-y-10">

    <!-- A. アップロードセクション -->
    <section class="bg-apple-card rounded-2xl p-6 shadow-sm border border-apple-border/80 transition-all duration-300 max-w-2xl mx-auto">
      <h2 class="text-lg font-semibold text-apple-text mb-4 flex items-center gap-2">
        <i data-lucide="upload-cloud" class="w-5 h-5 text-apple-primary"></i>
        新しいPDFをアップロード
      </h2>

      <!-- ドロップエリア -->
      <div id="dropZone" class="border-2 border-dashed border-apple-border rounded-xl p-6 text-center bg-gray-50/50 hover:bg-gray-50 hover:border-apple-primary/50 transition-all cursor-pointer group">
        <input type="file" id="pdfFile" accept="application/pdf" class="hidden">
        
        <div class="flex flex-col items-center justify-center space-y-3">
          <div class="p-3 bg-white rounded-full shadow-sm border border-apple-border group-hover:scale-105 transition-transform">
            <i data-lucide="file-up" class="w-7 h-7 text-apple-primary"></i>
          </div>
          <div>
            <p class="text-sm font-medium text-apple-text">
              クリックしてファイルを選択 <span class="text-apple-secondaryText font-normal">またはドラッグ＆ドロップ</span>
            </p>
            <p class="text-xs text-apple-secondaryText mt-1">PDF形式のみ対応</p>
          </div>
          <div id="selectedFileName" class="text-xs font-medium text-apple-primary bg-apple-primary/10 px-3 py-1 rounded-full hidden">
            <!-- 選択ファイル名 -->
          </div>
        </div>
      </div>

      <!-- 入力フォームエリア (ファイル選択時に表示) -->
      <div id="formFieldsContainer" class="mt-4 hidden space-y-3">
        <!-- 表示用タイトル -->
        <div>
          <label for="customTitle" class="block text-xs font-medium text-apple-secondaryText mb-1">
            表示用タイトル（任意）
          </label>
          <input type="text" id="customTitle" placeholder="未入力の場合は元のファイル名が使われます" class="w-full px-3.5 py-2 text-sm bg-gray-50 border border-apple-border rounded-xl focus:outline-none focus:ring-2 focus:ring-apple-primary/20 focus:border-apple-primary transition-all">
        </div>

        <!-- 削除用パスワード -->
        <div>
          <label for="uploadPassword" class="block text-xs font-medium text-apple-secondaryText mb-1">
            削除用パスワード（任意）
          </label>
          <div class="relative">
            <input type="password" id="uploadPassword" placeholder="設定すると削除時にこのパスワードが必要になります" class="w-full px-3.5 py-2 text-sm bg-gray-50 border border-apple-border rounded-xl focus:outline-none focus:ring-2 focus:ring-apple-primary/20 focus:border-apple-primary transition-all pr-10">
            <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-apple-secondaryText">
              <i data-lucide="lock" class="w-4 h-4"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- 送信ボタン -->
      <div class="mt-4 flex justify-end">
        <button id="uploadBtn" disabled class="px-6 py-2.5 bg-apple-primary hover:bg-apple-primaryHover disabled:opacity-40 disabled:hover:bg-apple-primary text-white text-sm font-medium rounded-xl shadow-sm transition-all duration-200 flex items-center space-x-2 cursor-pointer disabled:cursor-not-allowed">
          <i data-lucide="send" class="w-4 h-4"></i>
          <span>送信する</span>
        </button>
      </div>
    </section>

    <!-- B. ビジュアルギャラリーセクション -->
    <section class="space-y-4">
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-xl font-semibold text-apple-text flex items-center gap-2">
            <i data-lucide="layout-grid" class="w-5 h-5 text-apple-primary"></i>
            共有ドキュメント ライブラリ
          </h2>
          <p class="text-xs text-apple-secondaryText mt-0.5">スクロールして気になるPDFを見つけてみましょう</p>
        </div>
        <!-- 更新ボタン -->
        <button id="refreshBtn" class="p-2 text-apple-secondaryText hover:text-apple-text hover:bg-white rounded-xl border border-apple-border/60 transition-all shadow-sm" title="更新">
          <i data-lucide="refresh-cw" class="w-4 h-4"></i>
        </button>
      </div>

      <!-- カードグリッド表示エリア -->
      <div id="pdfGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <!-- JSで動的にカードが追加されます -->
      </div>
    </section>

  </main>

  <!-- フッター -->
  <footer class="max-w-6xl mx-auto px-6 py-6 w-full text-center text-xs text-apple-secondaryText flex justify-between items-center border-t border-apple-border/40">
    <p>&copy; PDF Portal System</p>
    <span class="opacity-40 text-[10px] font-mono">v1.3.0 (Password Protected)</span>
  </footer>

  <!-- 削除確認モーダル (パスワード入力付き) -->
  <div id="deleteModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-200">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl border border-apple-border transform scale-95 transition-transform duration-200" id="modalCard">
      <div class="text-center space-y-3">
        <div class="w-12 h-12 bg-red-100 text-apple-danger rounded-full flex items-center justify-center mx-auto">
          <i data-lucide="trash-2" class="w-6 h-6"></i>
        </div>
        <h3 class="text-base font-semibold text-apple-text">ファイルを削除しますか？</h3>
        <p class="text-xs text-apple-secondaryText" id="deleteModalNotice">この操作は取り消せません。</p>
      </div>

      <!-- パスワード入力エリア -->
      <div id="deletePasswordContainer" class="mt-4 space-y-1 text-left hidden">
        <label for="deletePasswordInput" class="block text-xs font-medium text-apple-secondaryText">
          削除用パスワード
        </label>
        <input type="password" id="deletePasswordInput" placeholder="設定したパスワードを入力" class="w-full px-3.5 py-2 text-sm bg-gray-50 border border-apple-border rounded-xl focus:outline-none focus:ring-2 focus:ring-apple-danger/20 focus:border-apple-danger transition-all">
        <p id="passwordErrorMsg" class="text-[11px] text-apple-danger mt-1 hidden">パスワードが正しくありません</p>
      </div>

      <div class="mt-6 flex space-x-3">
        <button id="cancelDeleteBtn" class="flex-1 py-2 bg-gray-100 hover:bg-gray-200 text-apple-text text-xs font-medium rounded-xl transition-colors">
          キャンセル
        </button>
        <button id="confirmDeleteBtn" class="flex-1 py-2 bg-apple-danger hover:bg-apple-dangerHover text-white text-xs font-medium rounded-xl transition-colors">
          削除する
        </button>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    // Supabase 設定
    const SUPABASE_URL = 'https://wgjhqhcrepyhqcxrxujg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable__5xWbo2yzkPwOyecIN_gOQ_6VE83HNT';

    let supabaseClient = null;
    let fileToDelete = null; // { id, path, delete_hash }
    let generatedThumbnailCanvas = null;

    // UIエレメント
    const statusBadge = document.getElementById('statusBadge');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('pdfFile');
    const customTitleInput = document.getElementById('customTitle');
    const uploadPasswordInput = document.getElementById('uploadPassword');
    const formFieldsContainer = document.getElementById('formFieldsContainer');
    const selectedFileName = document.getElementById('selectedFileName');
    const uploadBtn = document.getElementById('uploadBtn');
    const pdfGrid = document.getElementById('pdfGrid');
    const refreshBtn = document.getElementById('refreshBtn');

    // モーダルエレメント
    const deleteModal = document.getElementById('deleteModal');
    const modalCard = document.getElementById('modalCard');
    const deleteModalNotice = document.getElementById('deleteModalNotice');
    const deletePasswordContainer = document.getElementById('deletePasswordContainer');
    const deletePasswordInput = document.getElementById('deletePasswordInput');
    const passwordErrorMsg = document.getElementById('passwordErrorMsg');
    const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
    const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

    // 初期化
    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      initSupabase();
      setupEventListeners();
    });

    function initSupabase() {
      try {
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        updateStatus('success', 'Supabase接続完了');
        loadPdfs();
      } catch (e) {
        updateStatus('error', `初期化エラー: ${e.message}`);
      }
    }

    function updateStatus(type, message) {
      statusText.innerText = message;
      if (type === 'loading') {
        statusBadge.className = 'flex items-center space-x-2 px-3 py-1.5 rounded-full text-xs font-medium bg-blue-50 text-blue-600';
        statusDot.className = 'w-2 h-2 rounded-full bg-blue-500 animate-pulse';
      } else if (type === 'success') {
        statusBadge.className = 'flex items-center space-x-2 px-3 py-1.5 rounded-full text-xs font-medium bg-emerald-50 text-emerald-600';
        statusDot.className = 'w-2 h-2 rounded-full bg-emerald-500';
      } else if (type === 'error') {
        statusBadge.className = 'flex items-center space-x-2 px-3 py-1.5 rounded-full text-xs font-medium bg-rose-50 text-rose-600';
        statusDot.className = 'w-2 h-2 rounded-full bg-rose-500';
      }
    }

    // パスワードをSHA-256でハッシュ化するユーティリティ関数
    async function hashPassword(password) {
      if (!password) return null;
      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // イベントリスナー設定
    function setupEventListeners() {
      dropZone.addEventListener('click', () => fileInput.click());

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('border-apple-primary', 'bg-blue-50/30');
      });

      ['dragleave', 'dragend'].forEach(type => {
        dropZone.addEventListener(type, () => {
          dropZone.classList.remove('border-apple-primary', 'bg-blue-50/30');
        });
      });

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('border-apple-primary', 'bg-blue-50/30');
        if (e.dataTransfer.files.length > 0) {
          fileInput.files = e.dataTransfer.files;
          handleFileSelect();
        }
      });

      fileInput.addEventListener('change', handleFileSelect);
      uploadBtn.addEventListener('click', handleUpload);
      refreshBtn.addEventListener('click', loadPdfs);

      cancelDeleteBtn.addEventListener('click', closeModal);
      confirmDeleteBtn.addEventListener('click', executeDelete);
    }

    // ファイル選択処理 & 1枚目のサムネイル生成
    async function handleFileSelect() {
      const file = fileInput.files[0];
      if (!file) return;

      if (file.type !== 'application/pdf') {
        alert('PDF形式のファイルのみアップロード可能です。');
        fileInput.value = '';
        selectedFileName.classList.add('hidden');
        formFieldsContainer.classList.add('hidden');
        uploadBtn.disabled = true;
        return;
      }

      selectedFileName.innerText = `${file.name} (${(file.size / (1024 * 1024)).toFixed(2)} MB)`;
      selectedFileName.classList.remove('hidden');
      formFieldsContainer.classList.remove('hidden');
      customTitleInput.value = '';
      uploadPasswordInput.value = '';
      uploadBtn.disabled = false;

      // PDF 1ページ目のサムネイル生成
      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const page = await pdf.getPage(1);
        
        const viewport = page.getViewport({ scale: 0.5 });
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        await page.render({ canvasContext: context, viewport: viewport }).promise;
        generatedThumbnailCanvas = canvas;
      } catch (err) {
        console.warn('サムネイル生成に失敗しました:', err);
        generatedThumbnailCanvas = null;
      }
    }

    // PDF一覧取得 ＆ カードレンダリング
    async function loadPdfs() {
      if (!supabaseClient) return;
      updateStatus('loading', 'ライブラリを取得中...');

      const { data, error } = await supabaseClient
        .from('pdf_list')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        updateStatus('error', `取得失敗: ${error.message}`);
        return;
      }

      updateStatus('success', '正常に同期中');
      renderPdfGrid(data);
    }

    function renderPdfGrid(items) {
      pdfGrid.innerHTML = '';

      if (!items || items.length === 0) {
        pdfGrid.className = "col-span-full";
        pdfGrid.innerHTML = `
          <div class="p-12 text-center text-apple-secondaryText text-sm border border-dashed border-apple-border rounded-2xl bg-white/50">
            <i data-lucide="file-x" class="w-10 h-10 mx-auto mb-2 text-gray-300"></i>
            共有されたPDFはまだありません。上のフォームから追加してください。
          </div>`;
        return;
      }

      pdfGrid.className = "grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6";

      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'group bg-white rounded-2xl border border-apple-border/80 shadow-sm hover:shadow-md hover:border-apple-primary/40 transition-all duration-300 flex flex-col overflow-hidden relative';

        const dateStr = new Date(item.created_at).toLocaleString('ja-JP', {
          year: 'numeric', month: '2-digit', day: '2-digit'
        });

        const storagePath = extractStoragePath(item.file_url);
        const thumbnailSrc = item.thumbnail_url || 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="%2386868B" stroke-width="1"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>';

        // パスワード保護されている場合のキーアイコン表示
        const isLocked = !!item.delete_hash;

        card.innerHTML = `
          <!-- サムネイルプレビュー領域 -->
          <a href="${item.file_url}" target="_blank" rel="noopener noreferrer" class="block aspect-[4/3] bg-gray-100 overflow-hidden relative group/img cursor-pointer">
            <img src="${thumbnailSrc}" alt="${escapeHtml(item.file_name)}" class="w-full h-full object-cover object-top group-hover/img:scale-105 transition-transform duration-300">
            
            ${isLocked ? `
              <div class="absolute top-2.5 right-2.5 bg-black/60 backdrop-blur-md text-white p-1.5 rounded-lg shadow-sm" title="削除保護（パスワードあり）">
                <i data-lucide="lock" class="w-3.5 h-3.5"></i>
              </div>
            ` : ''}

            <div class="absolute inset-0 bg-black/0 group-hover/img:bg-black/10 transition-colors flex items-center justify-center">
              <span class="opacity-0 group-hover/img:opacity-100 transition-opacity bg-white/90 backdrop-blur-sm text-apple-text text-xs font-semibold px-3 py-1.5 rounded-full shadow-sm flex items-center gap-1">
                <i data-lucide="book-open" class="w-3.5 h-3.5"></i> 開く
              </span>
            </div>
          </a>

          <!-- カード詳細情報 -->
          <div class="p-4 flex flex-col flex-grow justify-between space-y-3">
            <div>
              <a href="${item.file_url}" target="_blank" rel="noopener noreferrer" class="font-medium text-sm text-apple-text hover:text-apple-primary line-clamp-2 transition-colors leading-snug" title="${escapeHtml(item.file_name)}">
                ${escapeHtml(item.file_name)}
              </a>
              <span class="text-[11px] text-apple-secondaryText mt-1 block">${dateStr}</span>
            </div>

            <!-- アクションエリア -->
            <div class="flex items-center justify-between pt-2 border-t border-apple-border/40">
              <a href="${item.file_url}" target="_blank" rel="noopener noreferrer" class="text-xs text-apple-primary font-medium flex items-center gap-1 hover:underline">
                <span>閲覧する</span>
                <i data-lucide="external-link" class="w-3 h-3"></i>
              </a>

              <button class="delete-btn text-apple-secondaryText hover:text-apple-danger p-1.5 hover:bg-red-50 rounded-lg transition-colors" 
                      title="削除" 
                      data-id="${item.id}" 
                      data-path="${storagePath}"
                      data-hash="${item.delete_hash || ''}">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
        `;

        pdfGrid.appendChild(card);
      });

      lucide.createIcons();

      // 削除ボタンへのイベントバインド
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const button = e.currentTarget;
          fileToDelete = {
            id: button.getAttribute('data-id'),
            path: button.getAttribute('data-path'),
            delete_hash: button.getAttribute('data-hash') || null
          };
          openModal();
        });
      });
    }

    // PDF ＆ サムネイルのアップロード
    async function handleUpload() {
      if (!supabaseClient) return;

      const file = fileInput.files[0];
      if (!file) return;

      uploadBtn.disabled = true;
      updateStatus('loading', 'アップロード準備中...');

      const timestamp = Date.now();
      const safeFileName = `${timestamp}_${file.name.replace(/[^a-zA-Z0-9.-]/g, '_')}`;
      
      const displayTitle = customTitleInput.value.trim() !== '' 
        ? customTitleInput.value.trim() 
        : file.name;

      // パスワードのハッシュ化
      const rawPassword = uploadPasswordInput.value.trim();
      const passwordHash = await hashPassword(rawPassword);

      try {
        let thumbnailUrl = null;

        // 1. サムネイルアップロード
        if (generatedThumbnailCanvas) {
          updateStatus('loading', 'サムネイルを作成中...');
          const thumbBlob = await new Promise(resolve => generatedThumbnailCanvas.toBlob(resolve, 'image/jpeg', 0.8));
          const thumbFileName = `thumb_${safeFileName}.jpg`;

          const { error: thumbStorageError } = await supabaseClient.storage
            .from('pdfs')
            .upload(thumbFileName, thumbBlob, { contentType: 'image/jpeg' });

          if (!thumbStorageError) {
            const { data: thumbUrlData } = supabaseClient.storage
              .from('pdfs')
              .getPublicUrl(thumbFileName);
            thumbnailUrl = thumbUrlData.publicUrl;
          }
        }

        // 2. PDF本体アップロード
        updateStatus('loading', 'PDF本体をアップロード中...');
        const { error: storageError } = await supabaseClient.storage
          .from('pdfs')
          .upload(safeFileName, file);

        if (storageError) throw storageError;

        const { data: urlData } = supabaseClient.storage
          .from('pdfs')
          .getPublicUrl(safeFileName);

        const publicUrl = urlData.publicUrl;

        // 3. DB (pdf_list) へ挿入（ハッシュ値を含む）
        const { error: dbError } = await supabaseClient
          .from('pdf_list')
          .insert([{ 
            file_name: displayTitle, 
            file_url: publicUrl,
            thumbnail_url: thumbnailUrl,
            delete_hash: passwordHash
          }]);

        if (dbError) throw dbError;

        updateStatus('success', 'アップロード成功');
        
        // フォームクリア
        fileInput.value = '';
        customTitleInput.value = '';
        uploadPasswordInput.value = '';
        selectedFileName.classList.add('hidden');
        formFieldsContainer.classList.add('hidden');
        generatedThumbnailCanvas = null;
        
        loadPdfs();

      } catch (err) {
        updateStatus('error', `エラー: ${err.message}`);
        uploadBtn.disabled = false;
      }
    }

    // 削除処理の実行（パスワード照合含む）
    async function executeDelete() {
      if (!fileToDelete || !supabaseClient) return;

      // パスワード照合処理
      if (fileToDelete.delete_hash) {
        const inputPass = deletePasswordInput.value.trim();
        const inputHash = await hashPassword(inputPass);

        if (inputHash !== fileToDelete.delete_hash) {
          passwordErrorMsg.classList.remove('hidden');
          deletePasswordInput.classList.add('border-apple-danger');
          return;
        }
      }

      closeModal();
      updateStatus('loading', 'ファイルを削除中...');

      try {
        if (fileToDelete.path) {
          const thumbPath = `thumb_${fileToDelete.path}.jpg`;
          await supabaseClient.storage.from('pdfs').remove([fileToDelete.path, thumbPath]);
        }

        const { error: dbError } = await supabaseClient
          .from('pdf_list')
          .delete()
          .eq('id', fileToDelete.id);

        if (dbError) throw dbError;

        updateStatus('success', '削除が完了しました');
        fileToDelete = null;
        loadPdfs();

      } catch (err) {
        updateStatus('error', `削除エラー: ${err.message}`);
      }
    }

    // モーダル表示制御
    function openModal() {
      deletePasswordInput.value = '';
      passwordErrorMsg.classList.add('hidden');
      deletePasswordInput.classList.remove('border-apple-danger');

      if (fileToDelete && fileToDelete.delete_hash) {
        deleteModalNotice.innerText = 'このファイルには削除用パスワードが設定されています。';
        deletePasswordContainer.classList.remove('hidden');
      } else {
        deleteModalNotice.innerText = 'この操作は取り消せません。データベースから削除されます。';
        deletePasswordContainer.classList.add('hidden');
      }

      deleteModal.classList.remove('hidden');
      setTimeout(() => {
        deleteModal.classList.remove('opacity-0');
        modalCard.classList.remove('scale-95');
        modalCard.classList.add('scale-100');
      }, 10);
    }

    function closeModal() {
      deleteModal.classList.add('opacity-0');
      modalCard.classList.remove('scale-100');
      modalCard.classList.add('scale-95');
      setTimeout(() => {
        deleteModal.classList.add('hidden');
      }, 200);
    }

    function extractStoragePath(url) {
      try {
        const parts = url.split('/storage/v1/object/public/pdfs/');
        return parts.length > 1 ? decodeURIComponent(parts[1]) : null;
      } catch (e) {
        return null;
      }
    }

    function escapeHtml(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }
  </script>
</body>
