<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF共有ポータル</title>
  
  <!-- 1. Tailwind CSS (CDN) - Apple HIGに準拠した洗練されたデザインシステムを適用 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Apple製品風のカラーパレット定義
            apple: {
              bg: '#F5F5F7',
              card: '#FFFFFF',
              primary: '#0071E3',
              primaryHover: '#0077ED',
              danger: '#FF3B30',
              dangerHover: '#D73A31',
              text: '#1D1D1F',
              secondaryText: '#86868B',
              border: '#E5E5EA',
            }
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', '"SF Pro Text"', '"Helvetica Neue"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- 2. Lucide Icons (アイコンライブラリ) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- 3. Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* iOS風のスムースなブラー・モーダル・トランジション設定 */
    .backdrop-blur-md {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: rgba(0,0,0,0.15);
      border-radius: 3px;
    }
  </style>
</head>
<body class="bg-apple-bg text-apple-text font-sans antialiased min-h-screen flex flex-col justify-between selection:bg-apple-primary selection:text-white">

  <!-- ヘッダーエリア (HIGスタイルのクリーンなナビゲーション) -->
  <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-apple-border/60">
    <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="p-2 bg-apple-primary/10 text-apple-primary rounded-xl">
          <i data-lucide="file-text" class="w-6 h-6"></i>
        </div>
        <h1 class="text-xl font-semibold tracking-tight text-apple-text">PDF共有ポータル</h1>
      </div>
      <!-- ステータスバッジ -->
      <div id="statusBadge" class="flex items-center space-x-2 px-3 py-1.5 rounded-full text-xs font-medium bg-gray-100 text-apple-secondaryText transition-all duration-300">
        <span class="w-2 h-2 rounded-full bg-gray-400 animate-pulse" id="statusDot"></span>
        <span id="statusText">システム初期化中...</span>
      </div>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="max-w-4xl mx-auto px-6 py-8 w-full flex-grow space-y-8">

    <!-- A. アップロードセクション (Drag & Drop 対応 Card) -->
    <section class="bg-apple-card rounded-2xl p-6 shadow-sm border border-apple-border/80 transition-all duration-300">
      <h2 class="text-lg font-semibold text-apple-text mb-4 flex items-center gap-2">
        <i data-lucide="upload-cloud" class="w-5 h-5 text-apple-primary"></i>
        新しいPDFをアップロード
      </h2>

      <!-- ファイル選択・ドラッグ＆ドロップエリア -->
      <div id="dropZone" class="border-2 border-dashed border-apple-border rounded-xl p-8 text-center bg-gray-50/50 hover:bg-gray-50 hover:border-apple-primary/50 transition-all cursor-pointer group">
        <input type="file" id="pdfFile" accept="application/pdf" class="hidden">
        
        <div class="flex flex-col items-center justify-center space-y-3">
          <div class="p-3 bg-white rounded-full shadow-sm border border-apple-border group-hover:scale-105 transition-transform">
            <i data-lucide="file-up" class="w-8 h-8 text-apple-primary"></i>
          </div>
          <div>
            <p class="text-sm font-medium text-apple-text">
              クリックしてファイルを選択 <span class="text-apple-secondaryText font-normal">またはドラッグ＆ドロップ</span>
            </p>
            <p class="text-xs text-apple-secondaryText mt-1">PDF形式のみ対応</p>
          </div>
          <div id="selectedFileName" class="text-xs font-medium text-apple-primary bg-apple-primary/10 px-3 py-1 rounded-full hidden">
            <!-- 選択ファイル名がここに入る -->
          </div>
        </div>
      </div>

      <!-- 送信ボタン -->
      <div class="mt-4 flex justify-end">
        <button id="uploadBtn" disabled class="px-6 py-2.5 bg-apple-primary hover:bg-apple-primaryHover disabled:opacity-40 disabled:hover:bg-apple-primary text-white text-sm font-medium rounded-xl shadow-sm transition-all duration-200 flex items-center space-x-2 cursor-pointer disabled:cursor-not-allowed">
          <i data-lucide="send" class="w-4 h-4"></i>
          <span>送信する</span>
        </button>
      </div>
    </section>

    <!-- B. 一覧取得・管理（CRUD: Read & Delete）セクション -->
    <section class="bg-apple-card rounded-2xl p-6 shadow-sm border border-apple-border/80">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-semibold text-apple-text flex items-center gap-2">
          <i data-lucide="files" class="w-5 h-5 text-apple-primary"></i>
          共有されたPDF一覧
        </h2>
        <!-- 手動更新ボタン -->
        <button id="refreshBtn" class="p-2 text-apple-secondaryText hover:text-apple-text hover:bg-gray-100 rounded-lg transition-colors" title="更新">
          <i data-lucide="refresh-cw" class="w-4 h-4"></i>
        </button>
      </div>

      <!-- リストコンテナ -->
      <div id="pdfListContainer">
        <ul id="pdfList" class="space-y-3">
          <!-- JSで動的に追加されます -->
        </ul>
      </div>
    </section>

  </main>

  <!-- フッター & バージョン表示 -->
  <footer class="max-w-4xl mx-auto px-6 py-6 w-full text-center text-xs text-apple-secondaryText flex justify-between items-center border-t border-apple-border/40">
    <p>&copy; PDF Portal System</p>
    <!-- バージョン情報 (視認性を低く設定) -->
    <span class="opacity-40 text-[10px] font-mono">v1.1.0</span>
  </footer>

  <!-- 削除確認モーダル (HIG準拠ダイアログ) -->
  <div id="deleteModal" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-200">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl border border-apple-border transform scale-95 transition-transform duration-200" id="modalCard">
      <div class="text-center space-y-3">
        <div class="w-12 h-12 bg-red-100 text-apple-danger rounded-full flex items-center justify-center mx-auto">
          <i data-lucide="trash-2" class="w-6 h-6"></i>
        </div>
        <h3 class="text-base font-semibold text-apple-text">ファイルを削除しますか？</h3>
        <p class="text-xs text-apple-secondaryText">この操作は取り消せません。データベースおよびストレージから完全に削除されます。</p>
      </div>
      <div class="mt-6 flex space-x-3">
        <button id="cancelDeleteBtn" class="flex-1 py-2 bg-gray-100 hover:bg-gray-200 text-apple-text text-xs font-medium rounded-xl transition-colors">
          キャンセル
        </button>
        <button id="confirmDeleteBtn" class="flex-1 py-2 bg-apple-danger hover:bg-apple-dangerHover text-white text-xs font-medium rounded-xl transition-colors">
          削除する
        </button>
      </div>
    </div>
  </div>

  <!-- JavaScript ロジック -->
  <script>
    // ----------------------------------------------------
    // ① Supabase 接続設定 (提供された設定情報・APIキーを使用)
    // ----------------------------------------------------
    const SUPABASE_URL = 'https://wgjhqhcrepyhqcxrxujg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable__5xWbo2yzkPwOyecIN_gOQ_6VE83HNT';

    let supabaseClient = null;
    let fileToDelete = null; // 削除対象のデータを一時保持

    // UIエレメントの取得
    const statusBadge = document.getElementById('statusBadge');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('pdfFile');
    const selectedFileName = document.getElementById('selectedFileName');
    const uploadBtn = document.getElementById('uploadBtn');
    const pdfList = document.getElementById('pdfList');
    const refreshBtn = document.getElementById('refreshBtn');
    const deleteModal = document.getElementById('deleteModal');
    const modalCard = document.getElementById('modalCard');
    const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
    const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

    // 初期化処理
    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons(); // アイコンレンダリング
      initSupabase();
      setupEventListeners();
    });

    // Supabase初期化
    function initSupabase() {
      try {
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        updateStatus('success', 'Supabase接続完了');
        loadPdfs();
      } catch (e) {
        updateStatus('error', `初期化エラー: ${e.message}`);
      }
    }

    // ステータス表示の更新（HIGカラーフィードバック）
    function updateStatus(type, message) {
      statusText.innerText = message;
      if (type === 'loading') {
        statusBadge.className = 'flex items-center space-x-2 px-3 py-1.5 rounded-full text-xs font-medium bg-blue-50 text-blue-600';
        statusDot.className = 'w-2 h-2 rounded-full bg-blue-500 animate-pulse';
      } else if (type === 'success') {
        statusBadge.className = 'flex items-center space-x-2 px-3 py-1.5 rounded-full text-xs font-medium bg-emerald-50 text-emerald-600';
        statusDot.className = 'w-2 h-2 rounded-full bg-emerald-500';
      } else if (type === 'error') {
        statusBadge.className = 'flex items-center space-x-2 px-3 py-1.5 rounded-full text-xs font-medium bg-rose-50 text-rose-600';
        statusDot.className = 'w-2 h-2 rounded-full bg-rose-500';
      }
    }

    // ----------------------------------------------------
    // ② イベントリレーショナリ（ファイル選択・ドラッグ&ドロップ）
    // ----------------------------------------------------
    function setupEventListeners() {
      // ドロップゾーンクリックでファイルインプット駆動
      dropZone.addEventListener('click', () => fileInput.click());

      // ドラッグ&ドロップ処理
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('border-apple-primary', 'bg-blue-50/30');
      });

      ['dragleave', 'dragend'].forEach(type => {
        dropZone.addEventListener(type, () => {
          dropZone.classList.remove('border-apple-primary', 'bg-blue-50/30');
        });
      });

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('border-apple-primary', 'bg-blue-50/30');
        if (e.dataTransfer.files.length > 0) {
          fileInput.files = e.dataTransfer.files;
          handleFileSelect();
        }
      });

      fileInput.addEventListener('change', handleFileSelect);
      uploadBtn.addEventListener('click', handleUpload);
      refreshBtn.addEventListener('click', loadPdfs);

      // モーダル削除操作
      cancelDeleteBtn.addEventListener('click', closeModal);
      confirmDeleteBtn.addEventListener('click', executeDelete);
    }

    // ファイル選択時のバリデーション＆UI更新
    function handleFileSelect() {
      const file = fileInput.files[0];
      if (!file) return;

      // バリデーション: PDF形式チェック
      if (file.type !== 'application/pdf') {
        alert('PDF形式のファイルのみアップロード可能です。');
        fileInput.value = '';
        selectedFileName.classList.add('hidden');
        uploadBtn.disabled = true;
        return;
      }

      // ファイル名表示とボタン活性化
      selectedFileName.innerText = `${file.name} (${(file.size / (1024 * 1024)).toFixed(2)} MB)`;
      selectedFileName.classList.remove('hidden');
      uploadBtn.disabled = false;
    }

    // ----------------------------------------------------
    // ③ Read: PDF一覧取得 (データベースからロード)
    // ----------------------------------------------------
    async function loadPdfs() {
      if (!supabaseClient) return;
      updateStatus('loading', '一覧を取得中...');

      const { data, error } = await supabaseClient
        .from('pdf_list')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        updateStatus('error', `取得失敗: ${error.message}`);
        return;
      }

      updateStatus('success', '正常に同期中');
      renderPdfList(data);
    }

    // PDF一覧のDOMレンダリング
    function renderPdfList(items) {
      pdfList.innerHTML = '';

      if (!items || items.length === 0) {
        pdfList.innerHTML = `
          <li class="p-8 text-center text-apple-secondaryText text-sm border border-dashed border-apple-border rounded-xl">
            共有されたPDFはまだありません。
          </li>`;
        return;
      }

      items.forEach(item => {
        const li = document.createElement('li');
        li.className = 'group flex items-center justify-between p-4 bg-gray-50/80 hover:bg-gray-100/80 rounded-xl transition-all border border-apple-border/40 hover:border-apple-border';
        
        const dateStr = new Date(item.created_at).toLocaleString('ja-JP', {
          year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
        });

        // 抽出用ストレージパスの保持（ファイル削除時に利用）
        const storagePath = extractStoragePath(item.file_url);

        li.innerHTML = `
          <div class="flex items-center space-x-3.5 min-w-0">
            <div class="p-2 bg-red-500/10 text-red-500 rounded-lg flex-shrink-0">
              <i data-lucide="file-text" class="w-5 h-5"></i>
            </div>
            <div class="min-w-0">
              <a href="${item.file_url}" target="_blank" rel="noopener noreferrer" class="text-sm font-medium text-apple-text hover:text-apple-primary truncate block transition-colors">
                ${escapeHtml(item.file_name)}
              </a>
              <span class="text-[11px] text-apple-secondaryText">${dateStr}</span>
            </div>
          </div>

          <div class="flex items-center space-x-2">
            <a href="${item.file_url}" target="_blank" rel="noopener noreferrer" class="p-2 text-apple-secondaryText hover:text-apple-primary hover:bg-white rounded-lg transition-all" title="開く">
              <i data-lucide="external-link" class="w-4 h-4"></i>
            </a>
            <!-- Delete（削除）ボタン -->
            <button class="delete-btn p-2 text-apple-secondaryText hover:text-apple-danger hover:bg-white rounded-lg transition-all" title="削除" data-id="${item.id}" data-path="${storagePath}">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
        `;

        pdfList.appendChild(li);
      });

      // アイコンの再適用
      lucide.createIcons();

      // 削除ボタンへのイベントリスナー紐付け
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const button = e.currentTarget;
          fileToDelete = {
            id: button.getAttribute('data-id'),
            path: button.getAttribute('data-path')
          };
          openModal();
        });
      });
    }

    // ----------------------------------------------------
    // ④ Create: PDFアップロード (Storage + DB保存)
    // ----------------------------------------------------
    async function handleUpload() {
      if (!supabaseClient) return;

      const file = fileInput.files[0];
      if (!file) return;

      uploadBtn.disabled = true;
      updateStatus('loading', 'アップロード中...');

      // ファイル名のエンコード・一意化
      const timestamp = Date.now();
      const safeFileName = `${timestamp}_${file.name.replace(/[^a-zA-Z0-9.-]/g, '_')}`;

      try {
        // A. Storageへのアップロード
        const { data: storageData, error: storageError } = await supabaseClient.storage
          .from('pdfs')
          .upload(safeFileName, file);

        if (storageError) throw storageError;

        // 公開URLを取得
        const { data: urlData } = supabaseClient.storage
          .from('pdfs')
          .getPublicUrl(safeFileName);

        const publicUrl = urlData.publicUrl;

        // B. DB (pdf_list) へレコード挿入
        const { error: dbError } = await supabaseClient
          .from('pdf_list')
          .insert([{ file_name: file.name, file_url: publicUrl }]);

        if (dbError) throw dbError;

        updateStatus('success', 'アップロード成功');
        
        // フォームリセット
        fileInput.value = '';
        selectedFileName.classList.add('hidden');
        
        // 一覧再取得
        loadPdfs();

      } catch (err) {
        updateStatus('error', `エラー: ${err.message}`);
        uploadBtn.disabled = false;
      }
    }

    // ----------------------------------------------------
    // ⑤ Delete: PDF削除機能 (CRUD原則の完全網羅)
    // ----------------------------------------------------
    async function executeDelete() {
      if (!fileToDelete || !supabaseClient) return;

      closeModal();
      updateStatus('loading', 'ファイルを削除中...');

      try {
        // A. Storageからの削除 (パスが存在する場合)
        if (fileToDelete.path) {
          const { error: storageError } = await supabaseClient.storage
            .from('pdfs')
            .remove([fileToDelete.path]);

          if (storageError) console.warn('Storage削除警告:', storageError.message);
        }

        // B. DBレコードの削除
        const { error: dbError } = await supabaseClient
          .from('pdf_list')
          .delete()
          .eq('id', fileToDelete.id);

        if (dbError) throw dbError;

        updateStatus('success', '削除が完了しました');
        fileToDelete = null;
        loadPdfs();

      } catch (err) {
        updateStatus('error', `削除エラー: ${err.message}`);
      }
    }

    // ----------------------------------------------------
    // モーダル制御 & ユーティリティ関数
    // ----------------------------------------------------
    function openModal() {
      deleteModal.classList.remove('hidden');
      setTimeout(() => {
        deleteModal.classList.remove('opacity-0');
        modalCard.classList.remove('scale-95');
        modalCard.classList.add('scale-100');
      }, 10);
    }

    function closeModal() {
      deleteModal.classList.add('opacity-0');
      modalCard.classList.remove('scale-100');
      modalCard.classList.add('scale-95');
      setTimeout(() => {
        deleteModal.classList.add('hidden');
      }, 200);
    }

    // URLからストレージ内部パスを抽出するヘルパー関数
    function extractStoragePath(url) {
      try {
        const parts = url.split('/storage/v1/object/public/pdfs/');
        return parts.length > 1 ? decodeURIComponent(parts[1]) : null;
      } catch (e) {
        return null;
      }
    }

    // HTMLエスケープ（XSS対策）
    function escapeHtml(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }
  </script>
</body>
</html>
