<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>PDF共有サイト</title>
  <!-- SupabaseのJSライブラリを読み込み -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-javascript@2"></script>
</head>
<body>
  <h1>PDF共有ポータル</h1>

  <!-- アップロードフォーム -->
  <section>
    <h2>PDFをアップロードする</h2>
    <input type="file" id="pdfFile" accept="application/pdf">
    <button id="uploadBtn">送信する</button>
  </section>

  <hr>

  <!-- PDF一覧表示エリア -->
  <section>
    <h2>共有されたPDF一覧</h2>
    <ul id="pdfList"></ul>
  </section>

  <script>
    // 1. Supabaseの初期化（※ここに先ほどの情報を入力）
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_KEY = 'YOUR_SUPABASE_PUBLISHABLE_KEY';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. ページを開いたときにPDF一覧を取得して表示する
    async function loadPdfs() {
      const listElement = document.getElementById('pdfList');
      listElement.innerHTML = '読み込み中...';

      // データベースから一覧を取得
      const { data, error } = await supabase.from('pdf_list').select('*').order('created_at', { ascending: false });

      if (error) {
        listElement.innerHTML = 'データの取得に失敗しました';
        return;
      }

      listElement.innerHTML = '';
      data.forEach(item => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="${item.file_url}" target="_blank">${item.file_name}</a>`;
        listElement.appendChild(li);
      });
    }

    // 3. アップロードボタンが押されたときの処理
    document.getElementById('uploadBtn').addEventListener('click', async () => {
      const fileInput = document.getElementById('pdfFile');
      const file = fileInput.files[0];

      if (!file) {
        alert('PDFファイルを選択してください');
        return;
      }

      // ファイル名をユニークにする（重複防止）
      const fileName = `${Date.now()}_${file.name}`;

      // A. Storage（pdfsバケット）にファイルを保存
      const { data: storageData, error: storageError } = await supabase.storage
        .from('pdfs')
        .upload(fileName, file);

      if (storageError) {
        alert('ファイルの保存に失敗しました: ' + storageError.message);
        return;
      }

      // 公開URLを取得
      const { data: urlData } = supabase.storage.from('pdfs').getPublicUrl(fileName);
      const publicUrl = urlData.publicUrl;

      // B. Database（pdf_listテーブル）にファイル情報を保存
      const { error: dbError } = await supabase.from('pdf_list').insert([
        { file_name: file.name, file_url: publicUrl }
      ]);

      if (dbError) {
        alert('情報の保存に失敗しました: ' + dbError.message);
        return;
      }

      alert('アップロード完了！');
      fileInput.value = '';
      loadPdfs(); // 一覧を再読み込み
    });

    // 初期表示
    loadPdfs();
  </script>
</body>
</html>
